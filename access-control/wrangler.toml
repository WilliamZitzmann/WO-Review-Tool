name = "wo-review-tool-access"
main = "worker.js"
compatibility_date = "2025-01-01"

[vars]
GITHUB_OWNER = "WilliamZitzmann"
GITHUB_REPO = "WO-Review-Tool-Private"
GITHUB_PUBLIC_REPO = "WO-Review-Tool"
GITHUB_BRANCH = "main"
# Not sensitive (just an email address) — a var, not a secret. Account-
# creation/reset emails send FROM this address via Resend. zitzmann.online
# is verified with Resend (SPF/DKIM/MX records live on Cloudflare DNS) as
# of 2026-07-17. Changing this value still needs `wrangler deploy` to take
# effect — wrangler.toml vars are baked in at deploy time, not read live.
RESEND_FROM_EMAIL = "admin@zitzmann.online"

# Secrets are NOT set here — set them with:
#   wrangler secret put GITHUB_PAT
#   wrangler secret put TOKEN_SECRET
#   wrangler secret put ROOT_ADMIN_TOKEN
#   wrangler secret put ADMIN_SESSION_SECRET
#   wrangler secret put RESEND_API_KEY
# See README.md for the full deploy walkthrough.
